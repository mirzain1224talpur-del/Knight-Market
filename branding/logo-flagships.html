<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightMarket — Flagship Marks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, sans-serif; background: radial-gradient(circle at 50% 0%, #1a1813, #0A0A0A 60%); color: #F5F0E8; padding: 56px 24px 100px; }
  h1 { font-size: 30px; text-align: center; margin-bottom: 6px; letter-spacing:-.5px; }
  .sub { text-align: center; opacity: .55; font-size: 14px; margin: 0 auto 48px; max-width:640px; line-height:1.5; }
  .stack { display:flex; flex-direction:column; gap: 26px; max-width: 860px; margin: 0 auto; }
  .card { border: 1px solid rgba(255,201,4,.14); border-radius: 22px; background: linear-gradient(180deg, #16140f, #100f0c); overflow:hidden; }
  .hero { display:flex; align-items:center; gap:34px; padding: 38px 40px; }
  .big { flex-shrink:0; filter: drop-shadow(0 6px 24px rgba(255,201,4,.18)); }
  .meta { flex:1; }
  .meta .num { font-size:11px; letter-spacing:2px; opacity:.4; text-transform:uppercase; }
  .meta h2 { font-size:23px; margin:4px 0 8px; }
  .meta p { font-size:13px; opacity:.6; line-height:1.55; }
  .row { display:flex; align-items:center; gap:28px; padding: 22px 40px; border-top:1px solid rgba(255,255,255,.06); background:#0c0b09;}
  .lockup { display:flex; align-items:center; gap:14px; }
  .word { font-weight:800; font-size:25px; letter-spacing:-1px; }
  .word .k { color:#F5F0E8; } .word .m { color:#FFC904; }
  .icons { margin-left:auto; display:flex; align-items:center; gap:16px; }
  .cap { font-size:10px; opacity:.35; text-align:center; margin-top:6px; }
  .appicon { border-radius:14px; }
  svg { display:block; }
</style>
</head>
<body>
  <!-- shared gradients -->
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE27A"/><stop offset="0.55" stop-color="#FFC904"/><stop offset="1" stop-color="#E09A00"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD24D"/><stop offset="1" stop-color="#F0A500"/>
    </linearGradient>
  </defs></svg>

  <h1>KnightMarket — Flagship Marks</h1>
  <div class="sub">Four trademark-grade emblems. Premium gold finish, perfect geometry, ownable silhouettes — abstract, so they carry any name and any number of campuses. Each shown big, as a wordmark lockup, and as a luxe dark app icon + favicon.</div>

  <div class="stack" id="stack"></div>

<script>
  const G = 'url(#gold)';
  // bare emblems (gold-gradient), drawn in a 64 box
  const emblems = {
    // 1 — faceted gem: value, the marketplace itself, luxury
    gem: `
      <path d="M22 17 H42 L52 29 L32 54 L12 29 Z" fill="${G}"/>
      <g stroke="#0A0A0A" stroke-opacity=".22" stroke-width="1.4" fill="none" stroke-linejoin="round">
        <path d="M12 29 H52"/><path d="M22 17 L26.5 29 L32 54"/><path d="M42 17 L37.5 29 L32 54"/><path d="M26.5 29 H37.5"/>
      </g>`,
    // 2 — orbit: a system built to scale, community
    orbit: `
      <circle cx="32" cy="32" r="20" fill="none" stroke="${G}" stroke-width="3.4"/>
      <circle cx="32" cy="32" r="7.6" fill="${G}"/>
      <circle cx="32" cy="12" r="4.6" fill="${G}"/>`,
    // 3 — people pin: a person inside a place = community + local (Belo logic)
    peoplepin: `
      <path d="M32 7 C44.5 7 53 16 53 28.5 C53 42 38 53 32 57 C26 53 11 42 11 28.5 C11 16 19.5 7 32 7 Z" fill="${G}"/>
      <circle cx="32" cy="25" r="6.4" fill="#0A0A0A"/>
      <path d="M20.5 45 C20.5 34.8 43.5 34.8 43.5 45 Z" fill="#0A0A0A"/>`,
    // 4 — petals: belonging / community converging (Airbnb-symbol energy)
    petals: `
      <g fill="${G}">
        <path d="M32 32 C27.8 23 27.8 13 32 9 C36.2 13 36.2 23 32 32 Z"/>
        <path d="M32 32 C27.8 23 27.8 13 32 9 C36.2 13 36.2 23 32 32 Z" transform="rotate(120 32 32)"/>
        <path d="M32 32 C27.8 23 27.8 13 32 9 C36.2 13 36.2 23 32 32 Z" transform="rotate(240 32 32)"/>
      </g>
      <circle cx="32" cy="32" r="3.4" fill="#0A0A0A"/>`,
  };

  function bare(size, key){ return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${emblems[key]}</svg>`; }
  // dark luxe app icon: black tile + gold emblem
  function appicon(size, key){ return `<svg class="appicon" width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="64" height="64" rx="15" fill="#0E0D0B" stroke="rgba(255,201,4,.18)"/>${emblems[key]}</svg>`; }

  const opts = [
    { n:'Flagship 01', t:'Apex', key:'gem', d:'A faceted gem — value, quality, the marketplace as something precious. Sharp, premium, unmistakable at any size.' },
    { n:'Flagship 02', t:'Orbit', key:'orbit', d:'A core with one satellite circling it — a system designed to scale. Add a school, add an orbit. Calm, modern, very “tech brand.”' },
    { n:'Flagship 03', t:'Gather', key:'peoplepin', d:'A person held inside a place — community + local, in one glyph. This is the Airbnb-symbol move: an emblem that means belonging.' },
    { n:'Flagship 04', t:'Bloom', key:'petals', d:'Three forms converging to a center — people coming together. Soft, premium, infinitely brandable.' },
  ];

  const stack = document.getElementById('stack');
  opts.forEach(o => {
    stack.insertAdjacentHTML('beforeend', `
      <div class="card">
        <div class="hero">
          <div class="big">${bare(120, o.key)}</div>
          <div class="meta"><div class="num">${o.n}</div><h2>${o.t}</h2><p>${o.d}</p></div>
        </div>
        <div class="row">
          <div class="lockup">${bare(40,o.key)}<span class="word"><span class="k">Knight</span><span class="m">Market</span></span></div>
          <div class="icons">
            <div><div>${appicon(52,o.key)}</div><div class="cap">app icon</div></div>
            <div><div>${appicon(28,o.key)}</div><div class="cap">favicon</div></div>
          </div>
        </div>
      </div>`);
  });
</script>
</body>
</html>
