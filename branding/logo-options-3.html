<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightMarket — Creative Logo Options</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, sans-serif; background: #0A0A0A; color: #F5F0E8; padding: 48px 24px 80px; }
  h1 { font-size: 28px; text-align: center; margin-bottom: 6px; }
  .sub { text-align: center; opacity: .5; font-size: 14px; margin-bottom: 40px; max-width:640px; margin-left:auto; margin-right:auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 22px; max-width: 1100px; margin: 0 auto; }
  .card { border: 1px solid rgba(255,255,255,.1); border-radius: 18px; overflow: hidden; background: #141414; }
  .name { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .name b { font-size: 14px; font-weight: 800; }
  .desc { font-size: 11.5px; opacity:.55; font-weight:400; margin-top:3px; line-height:1.4; }
  .scene { padding: 28px 24px; display: flex; align-items: center; gap: 18px; }
  .scene.light { background: #F5F0E8; }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .word { font-weight: 800; font-size: 25px; letter-spacing: -1px; white-space: nowrap; }
  .scene .word .k { color: #F5F0E8; }
  .scene.light .word .k { color: #0A0A0A; }
  .word .m { color: #FFC904; }
  .sizes { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  svg { display:block; }
</style>
</head>
<body>
  <h1>KnightMarket — Creative Marks</h1>
  <div class="sub">Options 11–16 · each one carries two meanings (marketplace + your brand). Black &amp; gold · big = logo, small = favicon · top dark, bottom light.</div>
  <div class="grid" id="grid"></div>

<script>
  const badge = `<rect x="2" y="2" width="60" height="60" rx="16" fill="#FFC904"/>`;
  const tagPath = `M34 13 L52 13 C53.7 13 55 14.3 55 16 L55 34 C55 34.8 54.7 35.6 54.1 36.2 L36.2 54.1 C34.6 55.7 32 55.7 30.4 54.1 L13.9 37.6 C12.3 36 12.3 33.4 13.9 31.8 L31.8 13.9 C32.4 13.3 33.2 13 34 13 Z`;

  const icons = {
    // 11 — Tag with K knocked out: a marketplace tag, branded.
    tagk: badge + `
      <path d="${tagPath}" fill="#0A0A0A"/>
      <circle cx="45.5" cy="23.5" r="3.6" fill="#FFC904"/>
      <text x="30" y="44" text-anchor="middle" font-family="Syne, sans-serif" font-weight="900" font-size="20" fill="#FFC904">K</text>`,

    // 12 — Shopping bag with K cut into it.
    bagk: badge + `
      <path d="M18 24 H46 L47.6 52 C47.7 53.1 46.8 54 45.6 54 H18.4 C17.2 54 16.3 53.1 16.4 52 Z" fill="#0A0A0A"/>
      <path d="M25 24 V19.5 C25 15.4 28.1 12 32 12 C35.9 12 39 15.4 39 19.5 V24" stroke="#0A0A0A" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="32" y="47" text-anchor="middle" font-family="Syne, sans-serif" font-weight="900" font-size="20" fill="#FFC904">K</text>`,

    // 13 — Map pin with a little house inside = local housing + marketplace.
    pinhome: badge + `
      <path d="M32 11 C22.6 11 15 18.6 15 28 C15 40 30 53.5 32 55 C34 53.5 49 40 49 28 C49 18.6 41.4 11 32 11 Z" fill="#0A0A0A"/>
      <path d="M24 31 L32 23.5 L40 31 Z" fill="#FFC904"/>
      <rect x="27.5" y="30" width="9" height="9" fill="#FFC904"/>`,

    // 14 — Storefront whose awning scallops spell an M (the M of Market).
    awningm: badge + `
      <rect x="16" y="34" width="32" height="18" rx="2" fill="#0A0A0A"/>
      <rect x="28" y="40" width="8" height="12" rx="1" fill="#FFC904"/>
      <path d="M13 21 H51 V28 C48 32 45 28 43.3 25 C41.6 28 38.6 32 35.7 28 C34 25 33 25 32 28 C30.5 32 27.5 32 25.7 28 C24 25 21 28 19.3 28 C17 28 14 25 13 28 Z" fill="#0A0A0A"/>
      <path d="M13 21 H51 V25 H13 Z" fill="#0A0A0A"/>`,

    // 15 — A K whose upper arm is an upward arrow = a market on the rise.
    growthk: badge + `
      <g stroke="#0A0A0A" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 14 V50"/>
        <path d="M23 33 L41 51"/>
        <path d="M23 33 L43 15"/>
        <path d="M34 15 H43 V24"/>
      </g>`,

    // 16 — Verified tag (checkmark) = trusted marketplace, their core promise.
    verifiedtag: badge + `
      <path d="${tagPath}" fill="#0A0A0A"/>
      <circle cx="45.5" cy="23.5" r="3.6" fill="#FFC904"/>
      <path d="M25 36 L30.5 41.5 L41 28" stroke="#FFC904" stroke-width="4.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`,
  };

  function mark(size, key){ return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${icons[key]}</svg>`; }

  const opts = [
    { n:'11 — Branded Tag (K)', d:'a price tag stamped with your K — pure marketplace, instantly “KnightMarket.”', key:'tagk' },
    { n:'12 — Bag + K', d:'shopping bag with the K cut into it — friendly commerce.', key:'bagk' },
    { n:'13 — Pin + Home', d:'a map pin holding a house — local + subleasing/housing, your biggest use case.', key:'pinhome' },
    { n:'14 — Market Awning (M)', d:'a storefront whose awning scallops form an M — “Market,” literally.', key:'awningm' },
    { n:'15 — Rising K', d:'the K’s arm is an up arrow — a marketplace on the rise.', key:'growthk' },
    { n:'16 — Verified Tag', d:'a tag with a check — your whole pitch is trust & verified students.', key:'verifiedtag' },
  ];

  const grid = document.getElementById('grid');
  opts.forEach(o => {
    const scene = (cls) => `
      <div class="scene ${cls}">
        <div class="lockup">${mark(44,o.key)}<span class="word"><span class="k">Knight</span><span class="m">Market</span></span></div>
        <div class="sizes">${mark(28,o.key)}${mark(16,o.key)}</div>
      </div>`;
    grid.insertAdjacentHTML('beforeend', `
      <div class="card">
        <div class="name"><b>${o.n}</b><div class="desc">${o.d}</div></div>
        ${scene('')}
        ${scene('light')}
      </div>`);
  });
</script>
</body>
</html>
