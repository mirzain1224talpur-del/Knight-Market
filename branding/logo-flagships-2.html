<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightMarket — Flagship Marks II</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, sans-serif; background: radial-gradient(circle at 50% 0%, #1a1813, #0A0A0A 60%); color: #F5F0E8; padding: 56px 24px 100px; }
  h1 { font-size: 30px; text-align: center; margin-bottom: 6px; letter-spacing:-.5px; }
  .sub { text-align: center; opacity: .55; font-size: 14px; margin: 0 auto 48px; max-width:640px; line-height:1.5; }
  .stack { display:flex; flex-direction:column; gap: 26px; max-width: 860px; margin: 0 auto; }
  .card { border: 1px solid rgba(255,201,4,.14); border-radius: 22px; background: linear-gradient(180deg, #16140f, #100f0c); overflow:hidden; }
  .hero { display:flex; align-items:center; gap:34px; padding: 38px 40px; }
  .big { flex-shrink:0; filter: drop-shadow(0 6px 24px rgba(255,201,4,.18)); }
  .meta { flex:1; }
  .meta .num { font-size:11px; letter-spacing:2px; opacity:.4; text-transform:uppercase; }
  .meta h2 { font-size:23px; margin:4px 0 8px; }
  .meta p { font-size:13px; opacity:.6; line-height:1.55; }
  .row { display:flex; align-items:center; gap:28px; padding: 22px 40px; border-top:1px solid rgba(255,255,255,.06); background:#0c0b09;}
  .lockup { display:flex; align-items:center; gap:14px; }
  .word { font-weight:800; font-size:25px; letter-spacing:-1px; }
  .word .k { color:#F5F0E8; } .word .m { color:#FFC904; }
  .icons { margin-left:auto; display:flex; align-items:center; gap:16px; }
  .cap { font-size:10px; opacity:.35; text-align:center; margin-top:6px; }
  .appicon { border-radius:14px; }
  svg { display:block; }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE27A"/><stop offset="0.55" stop-color="#FFC904"/><stop offset="1" stop-color="#E09A00"/>
    </linearGradient>
  </defs></svg>

  <h1>KnightMarket — Flagship Marks II</h1>
  <div class="sub">Four more trademark-grade emblems. Same premium finish — abstract, ownable, rename- and campus-proof.</div>

  <div class="stack" id="stack"></div>

<script>
  const G = 'url(#gold)';
  const emblems = {
    // 05 — aperture / pinwheel: a window into the market, motion, scale
    aperture: `
      <g fill="${G}">
        <path d="M33 30 L33 12 L47.5 20.5 Z"/>
        <path d="M33 30 L33 12 L47.5 20.5 Z" transform="rotate(120 32 32)"/>
        <path d="M33 30 L33 12 L47.5 20.5 Z" transform="rotate(240 32 32)"/>
      </g>`,
    // 06 — ascend: two rising chevrons = momentum, growth, "up market"
    ascend: `
      <g stroke="${G}" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 42 L32 26 L49 42"/>
        <path d="M21.5 27 L32 17 L42.5 27"/>
      </g>`,
    // 07 — union: two interlocking rings = partnership, connection, peer-to-peer
    union: `
      <circle cx="24.5" cy="32" r="13.5" fill="none" stroke="${G}" stroke-width="5"/>
      <circle cx="39.5" cy="32" r="13.5" fill="none" stroke="${G}" stroke-width="5"/>`,
    // 08 — seal: a medallion with a rising emblem = a trusted mark of value (trademark energy)
    seal: `
      <circle cx="32" cy="32" r="22" fill="none" stroke="${G}" stroke-width="2.6"/>
      <circle cx="32" cy="32" r="15.5" fill="${G}"/>
      <g stroke="#0A0A0A" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M25 35.5 L32 28 L39 35.5"/><path d="M32 28 V39.5"/>
      </g>`,
  };

  function bare(size, key){ return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${emblems[key]}</svg>`; }
  function appicon(size, key){ return `<svg class="appicon" width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="64" height="64" rx="15" fill="#0E0D0B" stroke="rgba(255,201,4,.18)"/>${emblems[key]}</svg>`; }

  const opts = [
    { n:'Flagship 05', t:'Aperture', key:'aperture', d:'Three blades opening to a center — a window into your market, with motion and energy. Reads premium and “tech” at any size.' },
    { n:'Flagship 06', t:'Ascend', key:'ascend', d:'Two rising chevrons — momentum, growth, a market on the way up. Minimal, confident, instantly readable.' },
    { n:'Flagship 07', t:'Union', key:'union', d:'Two interlocking rings — partnership, trust, two people making a deal. Timeless and endlessly brandable.' },
    { n:'Flagship 08', t:'Seal', key:'seal', d:'A medallion holding a rising emblem — a literal mark of trust & value. The closest thing here to a “trademark crest.”' },
  ];

  const stack = document.getElementById('stack');
  opts.forEach(o => {
    stack.insertAdjacentHTML('beforeend', `
      <div class="card">
        <div class="hero">
          <div class="big">${bare(120, o.key)}</div>
          <div class="meta"><div class="num">${o.n}</div><h2>${o.t}</h2><p>${o.d}</p></div>
        </div>
        <div class="row">
          <div class="lockup">${bare(40,o.key)}<span class="word"><span class="k">Knight</span><span class="m">Market</span></span></div>
          <div class="icons">
            <div><div>${appicon(52,o.key)}</div><div class="cap">app icon</div></div>
            <div><div>${appicon(28,o.key)}</div><div class="cap">favicon</div></div>
          </div>
        </div>
      </div>`);
  });
</script>
</body>
</html>
