<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightMarket — More Future-Proof Marks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, sans-serif; background: #0A0A0A; color: #F5F0E8; padding: 48px 24px 90px; }
  h1 { font-size: 28px; text-align: center; margin-bottom: 6px; }
  .sub { text-align: center; opacity: .55; font-size: 14px; margin: 0 auto 40px; max-width:680px; line-height:1.5; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 22px; max-width: 1120px; margin: 0 auto; }
  .card { border: 1px solid rgba(255,255,255,.1); border-radius: 18px; overflow: hidden; background: #141414; }
  .name { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .name b { font-size: 14.5px; font-weight: 800; }
  .desc { font-size: 11.5px; opacity:.55; font-weight:400; margin-top:3px; line-height:1.45; }
  .scene { padding: 26px 24px; display: flex; align-items: center; gap: 16px; }
  .scene.light { background: #F5F0E8; border-top:1px solid rgba(255,255,255,.06); }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .word { font-weight: 800; font-size: 23px; letter-spacing: -1px; white-space: nowrap; }
  .scene .word .k { color: #F5F0E8; } .scene.light .word .k { color: #0A0A0A; }
  .word .m { color: #FFC904; }
  .alt { font-weight: 800; font-size: 21px; letter-spacing:-.5px; opacity:.85; }
  .scene .alt { color:#F5F0E8; } .scene.light .alt { color:#0A0A0A; }
  .tagline { font-size:10px; opacity:.4; margin-left:auto; text-align:right; max-width:120px; line-height:1.3;}
  .sizes { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  svg { display:block; }
</style>
</head>
<body>
  <h1>KnightMarket — Future-Proof Marks, Vol. 2</h1>
  <div class="sub">Options 23–28. Same rules: no letters, no knight, no UCF. Shown with “KnightMarket” (top) and a different name (bottom) so you can see each survive a rebrand.</div>
  <div class="grid" id="grid"></div>

<script>
  const badge = `<rect x="2" y="2" width="60" height="60" rx="16" fill="#FFC904"/>`;
  const D = '#0A0A0A', G = '#FFC904';
  const icons = {
    // 23 — a dot with one orbiting around it = a system that scales (add orbits/campuses)
    orbit: badge + `
      <ellipse cx="32" cy="32" rx="21" ry="8.5" fill="none" stroke="${D}" stroke-width="3.4" transform="rotate(-22 32 32)"/>
      <circle cx="32" cy="32" r="6.6" fill="${D}"/>
      <circle cx="50.6" cy="24.4" r="4" fill="${D}"/>`,
    // 24 — infinity loop = goods circulating endlessly, a circular student economy
    infinity: badge + `
      <path d="M32 32 C27 24 17 24 17 32 C17 40 27 40 32 32 C37 24 47 24 47 32 C47 40 37 40 32 32 Z" stroke="${D}" stroke-width="5" fill="none" stroke-linecap="round"/>`,
    // 25 — an arch/bridge anchored on two sides = connecting buyers, sellers, campuses
    bridge: badge + `
      <path d="M13 48 V35 A19 19 0 0 1 51 35 V48" stroke="${D}" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="13" cy="50.5" r="3.6" fill="${D}"/>
      <circle cx="51" cy="50.5" r="3.6" fill="${D}"/>`,
    // 26 — an organic constellation of connected points = a living community / map
    constellation: badge + `
      <g stroke="${D}" stroke-width="2.6">
        <line x1="17" y1="23" x2="31" y2="16"/><line x1="31" y1="16" x2="46" y2="25"/>
        <line x1="46" y1="25" x2="39" y2="43"/><line x1="39" y1="43" x2="21" y2="41"/>
        <line x1="21" y1="41" x2="17" y2="23"/><line x1="31" y1="16" x2="39" y2="43"/>
      </g>
      <circle cx="17" cy="23" r="3.4" fill="${D}"/><circle cx="31" cy="16" r="3.9" fill="${D}"/>
      <circle cx="46" cy="25" r="3.4" fill="${D}"/><circle cx="39" cy="43" r="4.2" fill="${D}"/>
      <circle cx="21" cy="41" r="3.4" fill="${D}"/>`,
    // 27 — three petals meeting at a center = belonging / community (Airbnb-Bélo logic)
    petals: badge + `
      <g fill="${D}">
        <path d="M32 32 C28.3 24 28.3 15 32 11 C35.7 15 35.7 24 32 32 Z"/>
        <path d="M32 32 C28.3 24 28.3 15 32 11 C35.7 15 35.7 24 32 32 Z" transform="rotate(120 32 32)"/>
        <path d="M32 32 C28.3 24 28.3 15 32 11 C35.7 15 35.7 24 32 32 Z" transform="rotate(240 32 32)"/>
      </g>
      <circle cx="32" cy="32" r="3" fill="${G}"/>`,
    // 28 — a four-point spark = discovery / a great find / something new
    spark: badge + `
      <path d="M32 9 C33.4 24 40 30.6 55 32 C40 33.4 33.4 40 32 55 C30.6 40 24 33.4 9 32 C24 30.6 30.6 24 32 9 Z" fill="${D}"/>`,
  };

  function mark(size, key){ return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${icons[key]}</svg>`; }

  const opts = [
    { n:'23 — Orbit', d:'a core with something orbiting it — a system built to scale. Add campuses, add orbits.', key:'orbit', alt:'Orbit' },
    { n:'24 — Infinity', d:'goods circulating endlessly — a circular, reuse economy of student stuff.', key:'infinity', alt:'Loop' },
    { n:'25 — The Bridge', d:'an arch anchored on two sides — connecting buyers & sellers, school to school.', key:'bridge', alt:'Span' },
    { n:'26 — Constellation', d:'an organic web of points — a living community/map, not a rigid grid.', key:'constellation', alt:'Cohort' },
    { n:'27 — Petals', d:'three shapes meeting at a center = belonging & community (the Airbnb-symbol logic).', key:'petals', alt:'Belong' },
    { n:'28 — Spark', d:'a four-point spark = discovery, a great find, something new. Clean & trendy.', key:'spark', alt:'Find' },
  ];

  const grid = document.getElementById('grid');
  opts.forEach(o => {
    grid.insertAdjacentHTML('beforeend', `
      <div class="card">
        <div class="name"><b>${o.n}</b><div class="desc">${o.d}</div></div>
        <div class="scene">
          <div class="lockup">${mark(44,o.key)}<span class="word"><span class="k">Knight</span><span class="m">Market</span></span></div>
          <div class="sizes">${mark(28,o.key)}${mark(16,o.key)}</div>
        </div>
        <div class="scene light">
          <div class="lockup">${mark(40,o.key)}<span class="alt">${o.alt}</span></div>
          <div class="tagline">↑ same mark,<br>any name</div>
        </div>
      </div>`);
  });
</script>
</body>
</html>
