<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightMarket — Future-Proof Marks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, sans-serif; background: #0A0A0A; color: #F5F0E8; padding: 48px 24px 90px; }
  h1 { font-size: 28px; text-align: center; margin-bottom: 6px; }
  .sub { text-align: center; opacity: .55; font-size: 14px; margin: 0 auto 40px; max-width:680px; line-height:1.5; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 22px; max-width: 1120px; margin: 0 auto; }
  .card { border: 1px solid rgba(255,255,255,.1); border-radius: 18px; overflow: hidden; background: #141414; }
  .name { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,.08); }
  .name b { font-size: 14.5px; font-weight: 800; }
  .desc { font-size: 11.5px; opacity:.55; font-weight:400; margin-top:3px; line-height:1.45; }
  .scene { padding: 26px 24px; display: flex; align-items: center; gap: 16px; }
  .scene.light { background: #F5F0E8; border-top:1px solid rgba(255,255,255,.06); }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .word { font-weight: 800; font-size: 23px; letter-spacing: -1px; white-space: nowrap; }
  .scene .word .k { color: #F5F0E8; } .scene.light .word .k { color: #0A0A0A; }
  .word .m { color: #FFC904; }
  .alt { font-weight: 800; font-size: 21px; letter-spacing:-.5px; opacity:.85; }
  .scene .alt { color:#F5F0E8; } .scene.light .alt { color:#0A0A0A; }
  .tagline { font-size:10px; opacity:.4; margin-left:auto; text-align:right; max-width:120px; line-height:1.3;}
  .sizes { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  svg { display:block; }
</style>
</head>
<body>
  <h1>KnightMarket — Future-Proof Marks</h1>
  <div class="sub">Options 17–22. No letters, no knight, no UCF — each is an abstract symbol for the <em>idea</em>. To prove it survives a rename, every mark is shown with “KnightMarket” (top) AND a different name + standalone (bottom).</div>
  <div class="grid" id="grid"></div>

<script>
  const badge = `<rect x="2" y="2" width="60" height="60" rx="16" fill="#FFC904"/>`;
  const D = '#0A0A0A', G = '#FFC904';
  const icons = {
    // 17 — circular two-arrow exchange = goods circulating in a community
    loop: badge + `
      <g stroke="${D}" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 39 A16 16 0 0 1 41 18"/>
        <path d="M33 16.5 L41.5 17.8 L40.2 26.3"/>
        <path d="M45 25 A16 16 0 0 1 23 46"/>
        <path d="M31 47.5 L22.5 46.2 L23.8 37.7"/>
      </g>`,
    // 18 — a hub of connected nodes = community that grows campus by campus
    hub: badge + `
      <g stroke="${D}" stroke-width="3.4">
        <line x1="32" y1="32" x2="32" y2="13"/><line x1="32" y1="32" x2="50.1" y2="26.1"/>
        <line x1="32" y1="32" x2="43.2" y2="47.4"/><line x1="32" y1="32" x2="20.8" y2="47.4"/>
        <line x1="32" y1="32" x2="13.9" y2="26.1"/>
      </g>
      <circle cx="32" cy="32" r="7" fill="${D}"/>
      <circle cx="32" cy="13" r="4.3" fill="${D}"/><circle cx="50.1" cy="26.1" r="4.3" fill="${D}"/>
      <circle cx="43.2" cy="47.4" r="4.3" fill="${D}"/><circle cx="20.8" cy="47.4" r="4.3" fill="${D}"/>
      <circle cx="13.9" cy="26.1" r="4.3" fill="${D}"/>`,
    // 19 — two arrows meeting in the middle = a deal between two people
    deal: badge + `
      <g stroke="${D}" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 17 L29 32 L15 47"/>
        <path d="M49 17 L35 32 L49 47"/>
      </g>`,
    // 20 — abstract value gem / tag = a marketplace, no words
    gem: badge + `
      <rect x="17" y="17" width="30" height="30" rx="7" fill="${D}" transform="rotate(45 32 32)"/>
      <line x1="22.5" y1="32" x2="41.5" y2="32" stroke="${G}" stroke-width="3.2" stroke-linecap="round"/>
      <circle cx="32" cy="24" r="2.4" fill="${G}"/>`,
    // 21 — a local point radiating outward = local presence that spreads
    pulse: badge + `
      <circle cx="32" cy="40" r="5" fill="${D}"/>
      <path d="M22 35 A13 13 0 0 1 42 35" stroke="${D}" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M16 29 A21 21 0 0 1 48 29" stroke="${D}" stroke-width="4" fill="none" stroke-linecap="round"/>`,
    // 22 — two interlocking rounded squares = peer-to-peer / linked
    linked: badge + `
      <rect x="13" y="20" width="25" height="25" rx="8" stroke="${D}" stroke-width="5" fill="none"/>
      <rect x="26" y="20" width="25" height="25" rx="8" stroke="${D}" stroke-width="5" fill="none"/>`,
  };

  function mark(size, key){ return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${icons[key]}</svg>`; }

  const opts = [
    { n:'17 — Exchange Loop', d:'goods & value circulating through a community. Trade, peer-to-peer — reads the same under any name.', key:'loop', alt:'Swaply' },
    { n:'18 — The Hub', d:'connected nodes = a community that literally grows as you add campuses. The expansion IS the logo.', key:'hub', alt:'CampusHub' },
    { n:'19 — The Deal', d:'two sides meeting in the middle — a handshake, an agreement. Universal, wordless.', key:'deal', alt:'Tradely' },
    { n:'20 — Value Gem', d:'an abstract tag / gem = “a marketplace,” with zero letters or mascots.', key:'gem', alt:'Hagglr' },
    { n:'21 — Local Pulse', d:'a point radiating outward = local presence that spreads school to school.', key:'pulse', alt:'Nearby' },
    { n:'22 — Linked', d:'two interlocking tiles = students connecting & trust. Modern, infinitely rebrandable.', key:'linked', alt:'Loop' },
  ];

  const grid = document.getElementById('grid');
  opts.forEach(o => {
    grid.insertAdjacentHTML('beforeend', `
      <div class="card">
        <div class="name"><b>${o.n}</b><div class="desc">${o.d}</div></div>
        <div class="scene">
          <div class="lockup">${mark(44,o.key)}<span class="word"><span class="k">Knight</span><span class="m">Market</span></span></div>
          <div class="sizes">${mark(28,o.key)}${mark(16,o.key)}</div>
        </div>
        <div class="scene light">
          <div class="lockup">${mark(40,o.key)}<span class="alt">${o.alt}</span></div>
          <div class="tagline">↑ same mark,<br>any name</div>
        </div>
      </div>`);
  });
</script>
</body>
</html>
