<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KnightMarket — Finalists</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', system-ui, sans-serif; background: radial-gradient(circle at 50% -10%, #1c1a14, #0A0A0A 55%); color: #F5F0E8; padding: 56px 24px 100px; }
  h1 { font-size: 32px; text-align: center; margin-bottom: 6px; letter-spacing:-.5px; }
  .sub { text-align: center; opacity: .55; font-size: 14px; margin: 0 auto 46px; max-width:620px; line-height:1.5; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap:22px; max-width:1080px; margin:0 auto; }
  .card { border:1px solid rgba(255,201,4,.16); border-radius:22px; background:linear-gradient(180deg,#16140f,#100f0c); padding:30px 28px 22px; text-align:center; position:relative; }
  .pick { position:absolute; top:16px; left:18px; width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,201,4,.4); color:#FFC904; font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .big { filter: drop-shadow(0 6px 22px rgba(255,201,4,.2)); margin: 6px 0 14px; }
  .nm { font-size:20px; font-weight:800; }
  .dz { font-size:12px; opacity:.55; margin-top:5px; line-height:1.5; min-height:34px; }
  .foot { display:flex; align-items:center; justify-content:center; gap:18px; margin-top:18px; padding-top:18px; border-top:1px solid rgba(255,255,255,.07); }
  .lk { display:flex; align-items:center; gap:10px; }
  .word { font-weight:800; font-size:17px; letter-spacing:-.6px; }
  .word .k{color:#F5F0E8} .word .m{color:#FFC904}
  .appicon{border-radius:11px}
  svg{display:block}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE27A"/><stop offset="0.55" stop-color="#FFC904"/><stop offset="1" stop-color="#E09A00"/>
    </linearGradient>
  </defs></svg>

  <h1>The Finalists</h1>
  <div class="sub">The 6 strongest, side by side, in one premium finish. Each is abstract enough to survive a rename and scale across campuses. Tell me the number.</div>

  <div class="grid" id="grid"></div>

<script>
  const G='url(#gold)', D='#0A0A0A';
  const emblems = {
    gather: `
      <path d="M32 7 C44.5 7 53 16 53 28.5 C53 42 38 53 32 57 C26 53 11 42 11 28.5 C11 16 19.5 7 32 7 Z" fill="${G}"/>
      <circle cx="32" cy="25" r="6.4" fill="${D}"/>
      <path d="M20.5 45 C20.5 34.8 43.5 34.8 43.5 45 Z" fill="${D}"/>`,
    apex: `
      <path d="M22 17 H42 L52 29 L32 54 L12 29 Z" fill="${G}"/>
      <g stroke="${D}" stroke-opacity=".22" stroke-width="1.4" fill="none" stroke-linejoin="round">
        <path d="M12 29 H52"/><path d="M22 17 L26.5 29 L32 54"/><path d="M42 17 L37.5 29 L32 54"/><path d="M26.5 29 H37.5"/>
      </g>`,
    seal: `
      <circle cx="32" cy="32" r="22" fill="none" stroke="${G}" stroke-width="2.6"/>
      <circle cx="32" cy="32" r="15.5" fill="${G}"/>
      <g stroke="${D}" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M25 35.5 L32 28 L39 35.5"/><path d="M32 28 V39.5"/>
      </g>`,
    aperture: `
      <g fill="${G}">
        <path d="M33 30 L33 12 L47.5 20.5 Z"/>
        <path d="M33 30 L33 12 L47.5 20.5 Z" transform="rotate(120 32 32)"/>
        <path d="M33 30 L33 12 L47.5 20.5 Z" transform="rotate(240 32 32)"/>
      </g>`,
    compass: `
      <circle cx="32" cy="32" r="21" fill="none" stroke="${G}" stroke-width="2.6"/>
      <path d="M32 14 L35.5 28.5 L50 32 L35.5 35.5 L32 50 L28.5 35.5 L14 32 L28.5 28.5 Z" fill="${G}"/>`,
    combag: `
      <path d="M17 24 H47 L48.5 49.5 a3.5 3.5 0 0 1 -3.5 3.7 H19 a3.5 3.5 0 0 1 -3.5 -3.7 Z" fill="none" stroke="${G}" stroke-width="3.4" stroke-linejoin="round"/>
      <path d="M25 24 V19.5 C25 15.4 28.1 12 32 12 C35.9 12 39 15.4 39 19.5 V24" stroke="${G}" stroke-width="3.4" fill="none" stroke-linecap="round"/>
      <g stroke="${G}" stroke-width="1.8">
        <line x1="25" y1="35" x2="38" y2="32"/><line x1="38" y1="32" x2="40" y2="44"/>
        <line x1="40" y1="44" x2="27" y2="46"/><line x1="27" y1="46" x2="25" y2="35"/>
      </g>
      <circle cx="25" cy="35" r="2.6" fill="${G}"/><circle cx="38" cy="32" r="2.6" fill="${G}"/>
      <circle cx="40" cy="44" r="2.6" fill="${G}"/><circle cx="27" cy="46" r="2.6" fill="${G}"/>`,
  };
  function bare(size,key){ return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">${emblems[key]}</svg>`; }
  function appicon(size,key){ return `<svg class="appicon" width="${size}" height="${size}" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="15" fill="#0E0D0B" stroke="rgba(255,201,4,.18)"/>${emblems[key]}</svg>`; }

  const opts = [
    { nm:'Gather', dz:'a person inside a place — community + local. The most “real brand” emblem.', key:'gather' },
    { nm:'Apex', dz:'a faceted gem — value & luxury, razor-sharp at any size.', key:'apex' },
    { nm:'Seal', dz:'a medallion mark of trust — closest to a trademark crest.', key:'seal' },
    { nm:'Aperture', dz:'blades opening to a center — a modern, “tech-unicorn” mark.', key:'aperture' },
    { nm:'Compass', dz:'navigate & discover the market — classy and balanced.', key:'compass' },
    { nm:'Community Bag', dz:'a shop bag holding a network — your reference style + your growth story.', key:'combag' },
  ];

  const grid=document.getElementById('grid');
  opts.forEach((o,i)=>{
    grid.insertAdjacentHTML('beforeend',`
      <div class="card">
        <div class="pick">${i+1}</div>
        <div class="big">${bare(96,o.key)}</div>
        <div class="nm">${o.nm}</div>
        <div class="dz">${o.dz}</div>
        <div class="foot">
          <div class="lk">${bare(28,o.key)}<span class="word"><span class="k">Knight</span><span class="m">Market</span></span></div>
          ${appicon(34,o.key)}
        </div>
      </div>`);
  });
</script>
</body>
</html>
